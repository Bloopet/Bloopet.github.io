<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a2e" rx="12"/>
  <rect x="20" y="20" width="100" height="100" fill="#252547" rx="6" stroke="#6c63ff" stroke-width="2"/>
  <!-- pixel grid dots -->
  <g fill="#6c63ff" opacity="0.3">
    <rect x="28" y="28" width="8" height="8" rx="1"/>
    <rect x="40" y="28" width="8" height="8" rx="1"/>
    <rect x="52" y="28" width="8" height="8" rx="1"/>
    <rect x="28" y="40" width="8" height="8" rx="1"/>
    <rect x="40" y="40" width="8" height="8" rx="1"/>
  </g>
  <!-- cursor arrow drawn in pixels -->
  <rect x="28" y="28" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="28" y="40" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="28" y="52" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="28" y="64" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="40" y="40" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="40" y="52" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="52" y="52" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="52" y="64" width="8" height="8" rx="1" fill="#ffffff"/>
  <rect x="40" y="64" width="8" height="8" rx="1" fill="#ffffff"/>
  <!-- color palette swatches -->
  <rect x="130" y="20" width="16" height="16" rx="3" fill="#ff6584"/>
  <rect x="150" y="20" width="16" height="16" rx="3" fill="#ffd700"/>
  <rect x="170" y="20" width="16" height="16" rx="3" fill="#44ff88"/>
  <rect x="130" y="40" width="16" height="16" rx="3" fill="#6c63ff"/>
  <rect x="150" y="40" width="16" height="16" rx="3" fill="#00d4ff"/>
  <rect x="170" y="40" width="16" height="16" rx="3" fill="#ff8c00"/>
  <rect x="130" y="60" width="16" height="16" rx="3" fill="#b57bee"/>
  <rect x="150" y="60" width="16" height="16" rx="3" fill="#ffffff"/>
  <rect x="170" y="60" width="16" height="16" rx="3" fill="#888888"/>
  <!-- label -->
  <text x="100" y="155" text-anchor="middle" fill="#6c63ff" font-family="sans-serif" font-size="18" font-weight="bold">Cursor</text>
  <text x="100" y="175" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="13">Workshop</text>
  <!-- pencil icon -->
  <text x="100" y="135" text-anchor="middle" font-size="22">🖱️</text>
</svg>
