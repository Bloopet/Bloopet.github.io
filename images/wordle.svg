<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#121213" rx="12"/>
  <!-- Title -->
  <text x="150" y="44" text-anchor="middle" font-family="Arial Black,Arial" font-size="26" font-weight="900" fill="white" letter-spacing="4">WORDLE</text>
  <!-- Row 1 - gray (wrong) -->
  <rect x="30" y="58" width="44" height="44" rx="4" fill="#818384"/>
  <rect x="82" y="58" width="44" height="44" rx="4" fill="#818384"/>
  <rect x="134" y="58" width="44" height="44" rx="4" fill="#818384"/>
  <rect x="186" y="58" width="44" height="44" rx="4" fill="#818384"/>
  <rect x="238" y="58" width="44" height="44" rx="4" fill="#818384"/>
  <text x="52" y="90" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">C</text>
  <text x="104" y="90" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">R</text>
  <text x="156" y="90" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">A</text>
  <text x="208" y="90" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">N</text>
  <text x="260" y="90" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">E</text>
  <!-- Row 2 - yellow (wrong pos) + green -->
  <rect x="30" y="110" width="44" height="44" rx="4" fill="#b59f3b"/>
  <rect x="82" y="110" width="44" height="44" rx="4" fill="#538d4e"/>
  <rect x="134" y="110" width="44" height="44" rx="4" fill="#b59f3b"/>
  <rect x="186" y="110" width="44" height="44" rx="4" fill="#818384"/>
  <rect x="238" y="110" width="44" height="44" rx="4" fill="#538d4e"/>
  <text x="52" y="142" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">O</text>
  <text x="104" y="142" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">R</text>
  <text x="156" y="142" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">D</text>
  <text x="208" y="142" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">E</text>
  <text x="260" y="142" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">L</text>
  <!-- Row 3 - all green (winner) -->
  <rect x="30" y="162" width="44" height="44" rx="4" fill="#538d4e"/>
  <rect x="82" y="162" width="44" height="44" rx="4" fill="#538d4e"/>
  <rect x="134" y="162" width="44" height="44" rx="4" fill="#538d4e"/>
  <rect x="186" y="162" width="44" height="44" rx="4" fill="#538d4e"/>
  <rect x="238" y="162" width="44" height="44" rx="4" fill="#538d4e"/>
  <text x="52" y="194" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">W</text>
  <text x="104" y="194" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">O</text>
  <text x="156" y="194" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">R</text>
  <text x="208" y="194" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">D</text>
  <text x="260" y="194" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="white">L</text>
  <!-- Empty rows -->
  <rect x="30" y="214" width="44" height="44" rx="4" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="82" y="214" width="44" height="44" rx="4" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="134" y="214" width="44" height="44" rx="4" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="186" y="214" width="44" height="44" rx="4" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="238" y="214" width="44" height="44" rx="4" fill="none" stroke="#3a3a3c" stroke-width="2"/>
</svg>
