<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg)" rx="12"/>
  <!-- Lock body -->
  <rect x="90" y="150" width="120" height="100" rx="12" fill="#334155"/>
  <rect x="90" y="150" width="120" height="100" rx="12" fill="none" stroke="#64748b" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M115 150 L115 110 Q150 75 185 110 L185 150" fill="none" stroke="#64748b" stroke-width="16" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="150" cy="195" r="14" fill="#0f172a"/>
  <rect x="144" y="195" width="12" height="22" rx="4" fill="#0f172a"/>
  <!-- Colored dots pattern (breaklock code) -->
  <circle cx="120" cy="60" r="18" fill="#ef4444"/>
  <circle cx="150" cy="60" r="18" fill="#3b82f6"/>
  <circle cx="180" cy="60" r="18" fill="#22c55e"/>
  <circle cx="120" cy="35" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="150" cy="35" r="5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="180" cy="35" r="5" fill="#fbbf24" opacity="0.7"/>
  <!-- Title -->
  <text x="150" y="285" text-anchor="middle" font-family="Arial Black,Arial" font-size="14" font-weight="900" fill="#94a3b8" letter-spacing="2">BREAKLOCK</text>
</svg>
