<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6cf5"/>
      <stop offset="100%" style="stop-color:#4f9eff"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="200" height="200" fill="url(#bg)" rx="16"/>
  <!-- floating stars -->
  <circle cx="20" cy="30" r="1.5" fill="#e6edf3" opacity="0.25"/>
  <circle cx="170" cy="20" r="1" fill="#e6edf3" opacity="0.2"/>
  <circle cx="185" cy="80" r="1.5" fill="#e6edf3" opacity="0.18"/>
  <circle cx="15" cy="150" r="1" fill="#e6edf3" opacity="0.22"/>
  <circle cx="175" cy="170" r="1.5" fill="#e6edf3" opacity="0.2"/>
  <circle cx="140" cy="30" r="1" fill="#e6edf3" opacity="0.15"/>
  <!-- glitch 404 layers -->
  <text x="100" y="98" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#ff4f6a" opacity="0.45" transform="translate(-2,0)">404</text>
  <text x="100" y="98" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#4fffb8" opacity="0.45" transform="translate(2,0)">404</text>
  <text x="100" y="98" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#4f9eff">404</text>
  <!-- emoji above 404 -->
  <text x="100" y="60" text-anchor="middle" font-size="22">🎮</text>
  <!-- title bar mock -->
  <rect x="36" y="114" width="128" height="9" rx="4.5" fill="#e6edf3" opacity="0.12"/>
  <!-- message mock lines -->
  <rect x="50" y="130" width="100" height="5" rx="2.5" fill="#8b949e" opacity="0.3"/>
  <rect x="58" y="139" width="84" height="5" rx="2.5" fill="#8b949e" opacity="0.22"/>
  <!-- button mock -->
  <rect x="64" y="154" width="72" height="18" rx="9" fill="url(#accent)" opacity="0.9"/>
  <text x="100" y="166.5" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="7.5" fill="white">✏️ Customize</text>
</svg>
