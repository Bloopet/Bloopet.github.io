<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="split" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="50%" style="stop-color:#7f1d1d"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#split)" rx="12"/>
  <!-- Forest tree silhouettes top -->
  <polygon points="30,120 60,60 90,120" fill="#14532d" opacity="0.6"/>
  <polygon points="60,110 90,50 120,110" fill="#15803d" opacity="0.7"/>
  <polygon points="180,110 210,50 240,110" fill="#15803d" opacity="0.7"/>
  <polygon points="210,120 240,60 270,120" fill="#14532d" opacity="0.6"/>
  <!-- Temple pillars -->
  <rect x="100" y="100" width="20" height="160" fill="#78350f" opacity="0.7"/>
  <rect x="180" y="100" width="20" height="160" fill="#1e40af" opacity="0.7"/>
  <!-- Temple arch -->
  <path d="M100 120 Q150 70 200 120" fill="none" stroke="#92400e" stroke-width="8"/>
  <!-- Fireboy (red character) -->
  <circle cx="100" cy="210" r="18" fill="#ef4444"/>
  <polygon points="100,170 88,195 112,195" fill="#f97316"/>
  <circle cx="95" cy="206" r="4" fill="#7f1d1d"/>
  <circle cx="105" cy="206" r="4" fill="#7f1d1d"/>
  <!-- Watergirl (blue character) -->
  <circle cx="200" cy="210" r="18" fill="#3b82f6"/>
  <polygon points="200,170 188,195 212,195" fill="#93c5fd"/>
  <circle cx="195" cy="206" r="4" fill="#1e3a8a"/>
  <circle cx="205" cy="206" r="4" fill="#1e3a8a"/>
  <!-- Fire flame -->
  <ellipse cx="100" cy="240" rx="8" ry="14" fill="#fbbf24"/>
  <ellipse cx="100" cy="240" rx="5" ry="9" fill="#ef4444"/>
  <!-- Water drop -->
  <ellipse cx="200" cy="240" rx="8" ry="12" fill="#93c5fd"/>
  <ellipse cx="200" cy="240" rx="5" ry="8" fill="#bfdbfe"/>
  <!-- Title -->
  <rect x="55" y="270" width="190" height="22" rx="6" fill="#000" opacity="0.5"/>
  <text x="150" y="285" text-anchor="middle" font-family="Arial Black,Arial" font-size="10" font-weight="900" fill="white" letter-spacing="1">FIREBOY &amp; WATERGIRL 2</text>
</svg>
