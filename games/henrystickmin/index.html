<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry Stickmin Collection</title>
<style>
  body { background: #0a0a14; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  h1 { color: #00d4ff; text-align: center; margin-bottom: 30px; }
  .cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
  .card { display: flex; flex-direction: column; align-items: center; background: #1a1a2e; border: 2px solid #333; border-radius: 12px; padding: 16px; text-decoration: none; color: #fff; width: 160px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
  .card:hover { border-color: #00d4ff; transform: scale(1.05); }
  .card img { width: 120px; height: 80px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
  .card span { font-size: 13px; text-align: center; }
</style>
</head>
<body>
<h1>Henry Stickmin Collection</h1>
<div class="cards">
    <a href="breakingthebank/index.html" class="card">
      <img src="/img/games/breakingthebank.png" onerror="this.style.display='none'">
      <span>Breaking the Bank</span>
    </a>
    <a href="escapingtheprison/index.html" class="card">
      <img src="/img/games/escapingtheprison.png" onerror="this.style.display='none'">
      <span>Escaping the Prison</span>
    </a>
    <a href="fleeingthecomplex/index.html" class="card">
      <img src="/img/games/fleeingthecomplex.png" onerror="this.style.display='none'">
      <span>Fleeing the Complex</span>
    </a>
    <a href="infiltratingtheairship/index.html" class="card">
      <img src="/img/games/infiltratingtheairship.png" onerror="this.style.display='none'">
      <span>Infiltrating the Airship</span>
    </a>
    <a href="stealingthediamond/index.html" class="card">
      <img src="/img/games/stealingthediamond.png" onerror="this.style.display='none'">
      <span>Stealing the Diamond</span>
    </a></div>
</body>
</html>
