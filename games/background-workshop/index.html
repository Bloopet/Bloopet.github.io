<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Background Workshop — Bloopet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-x:hidden}
h1{font-size:1.6rem;margin-bottom:2px;background:linear-gradient(90deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:#888;font-size:0.8rem;margin-bottom:16px}
.tabs{display:flex;gap:6px;margin-bottom:14px;background:#252547;padding:4px;border-radius:10px}
.tab{padding:8px 18px;border:none;border-radius:7px;background:transparent;color:#888;cursor:pointer;font-size:0.85rem;font-weight:600;transition:all .2s}
.tab.active{background:#6c63ff;color:#fff;box-shadow:0 2px 10px rgba(108,99,255,.4)}
.tab:hover:not(.active){color:#fff}
.main{display:flex;gap:14px;width:100%;max-width:820px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.preview-wrap{flex:1;min-width:280px;max-width:440px}
.preview-label{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.preview{width:100%;aspect-ratio:16/9;border-radius:12px;border:2px solid #444;overflow:hidden;position:relative;min-height:180px}
.preview-content{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1}
.preview-text{font-size:1.1rem;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5);color:#fff}
.preview-sub{font-size:0.75rem;color:rgba(255,255,255,.7);text-shadow:0 1px 4px rgba(0,0,0,.5)}
.preview-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.controls{flex:1;min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:12px}
.panel{display:none}
.panel.active{display:flex;flex-direction:column;gap:10px}
.section-title{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.color-row{display:flex;align-items:center;gap:8px}
.color-pick{width:40px;height:40px;border-radius:8px;border:3px solid #fff;cursor:pointer;flex-shrink:0}
input[type=color]{opacity:0;position:absolute;width:0;height:0;pointer-events:none}
.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.swatch{width:100%;aspect-ratio:1;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:#fff}
.preset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.preset-btn{height:44px;border:2px solid #444;border-radius:8px;cursor:pointer;transition:all .15s;font-size:0.72rem;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);overflow:hidden;display:flex;align-items:center;justify-content:center}
.preset-btn:hover{border-color:#6c63ff;transform:scale(1.02)}
.preset-btn.active{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.3)}
.dir-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.dir-btn{padding:6px;border:2px solid #444;border-radius:6px;background:#252547;color:#fff;cursor:pointer;font-size:1.1rem;text-align:center;transition:all .15s}
.dir-btn:hover,.dir-btn.active{border-color:#6c63ff;background:#3a3a6e}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row label{font-size:0.75rem;color:#888;white-space:nowrap;min-width:54px}
.slider-row input[type=range]{flex:1;accent-color:#6c63ff}
.slider-row span{font-size:0.75rem;color:#fff;min-width:30px;text-align:right}
.pattern-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.anim-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.anim-btn{height:52px;border:2px solid #444;border-radius:8px;cursor:pointer;background:#252547;color:#fff;font-size:0.72rem;font-weight:600;transition:all .15s;padding:6px}
.anim-btn:hover{border-color:#6c63ff;background:#3a3a6e}
.anim-btn.active{border-color:#fff;background:#3a3a6e}
.anim-icon{font-size:1.3rem;display:block}
.action-btns{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.btn{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.85rem;transition:all .15s;width:100%}
.btn-primary{background:linear-gradient(90deg,#6c63ff,#8b5cf6);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,99,255,.4)}
.btn-secondary{background:#252547;color:#aaa;border:2px solid #444}
.btn-secondary:hover{border-color:#6c63ff;color:#fff}
.btn-danger{background:#1e1010;color:#ff6584;border:2px solid #3a1a1a}
.btn-danger:hover{background:#2a1515}
.status{font-size:0.75rem;color:#6c63ff;text-align:center;min-height:16px}
</style>
</head>
<body>
<h1>🎨 Background Workshop</h1>
<p class="subtitle">Customize the Bloopet homepage background</p>

<div class="tabs">
  <button class="tab active" data-tab="solid">🎨 Solid</button>
  <button class="tab" data-tab="gradient">🌈 Gradient</button>
  <button class="tab" data-tab="pattern">✦ Pattern</button>
  <button class="tab" data-tab="animated">✨ Animated</button>
</div>

<div class="main">
  <!-- Preview -->
  <div class="preview-wrap">
    <div class="preview-label">Live Preview</div>
    <div class="preview" id="preview">
      <canvas class="preview-canvas" id="anim-canvas"></canvas>
      <div class="preview-content">
        <div class="preview-text">🐾 Bloopet</div>
        <div class="preview-sub">Your homepage will look like this</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Solid panel -->
    <div class="panel active" id="panel-solid">
      <div>
        <div class="section-title">Color</div>
        <div class="color-row" style="margin-bottom:8px">
          <div class="color-pick" id="solid-swatch"></div>
          <input type="color" id="solid-picker" value="#1a1a2e">
          <span id="solid-hex" style="font-size:0.75rem;color:#888">#1a1a2e</span>
        </div>
        <div class="swatches" id="solid-swatches"></div>
      </div>
    </div>

    <!-- Gradient panel -->
    <div class="panel" id="panel-gradient">
      <div>
        <div class="section-title">Colors</div>
        <div class="color-row" style="margin-bottom:6px">
          <div class="color-pick" id="grad-swatch1"></div>
          <input type="color" id="grad-picker1" value="#6c63ff">
          <span style="font-size:0.75rem;color:#888">Color 1</span>
        </div>
        <div class="color-row">
          <div class="color-pick" id="grad-swatch2"></div>
          <input type="color" id="grad-picker2" value="#ff6584">
          <span style="font-size:0.75rem;color:#888">Color 2</span>
        </div>
      </div>
      <div>
        <div class="section-title">Direction</div>
        <div class="dir-grid" id="dir-grid"></div>
      </div>
      <div>
        <div class="section-title">Preset Gradients</div>
        <div class="preset-grid" id="grad-presets"></div>
      </div>
    </div>

    <!-- Pattern panel -->
    <div class="panel" id="panel-pattern">
      <div>
        <div class="section-title">Pattern</div>
        <div class="pattern-grid" id="pattern-grid"></div>
      </div>
      <div>
        <div class="section-title">Colors</div>
        <div class="color-row" style="margin-bottom:6px">
          <div class="color-pick" id="pat-swatch1"></div>
          <input type="color" id="pat-picker1" value="#1a1a2e">
          <span style="font-size:0.75rem;color:#888">Background</span>
        </div>
        <div class="color-row">
          <div class="color-pick" id="pat-swatch2"></div>
          <input type="color" id="pat-picker2" value="#6c63ff">
          <span style="font-size:0.75rem;color:#888">Pattern</span>
        </div>
      </div>
      <div>
        <div class="section-title">Scale</div>
        <div class="slider-row">
          <label>Size</label>
          <input type="range" id="pat-scale" min="10" max="80" value="30">
          <span id="pat-scale-val">30px</span>
        </div>
        <div class="slider-row" style="margin-top:6px">
          <label>Opacity</label>
          <input type="range" id="pat-opacity" min="5" max="100" value="30">
          <span id="pat-opacity-val">30%</span>
        </div>
      </div>
    </div>

    <!-- Animated panel -->
    <div class="panel" id="panel-animated">
      <div>
        <div class="section-title">Animation Style</div>
        <div class="anim-grid" id="anim-grid"></div>
      </div>
      <div>
        <div class="section-title">Base Color</div>
        <div class="color-row">
          <div class="color-pick" id="anim-swatch"></div>
          <input type="color" id="anim-picker" value="#1a1a2e">
          <span style="font-size:0.75rem;color:#888">Background</span>
        </div>
      </div>
      <div>
        <div class="section-title">Speed</div>
        <div class="slider-row">
          <label>Speed</label>
          <input type="range" id="anim-speed" min="1" max="10" value="5">
          <span id="anim-speed-val">5</span>
        </div>
      </div>
    </div>

    <div class="action-btns">
      <button class="btn btn-primary" id="btn-apply">✅ Set as Homepage Background</button>
      <button class="btn btn-danger" id="btn-reset">↺ Reset to Default</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let currentTab = 'solid';
let solidColor = '#1a1a2e';
let gradColor1 = '#6c63ff', gradColor2 = '#ff6584', gradDir = 'to bottom right';
let patternType = 'dots', patColor1 = '#1a1a2e', patColor2 = '#6c63ff', patScale = 30, patOpacity = 0.3;
let animType = 'stars', animBaseColor = '#1a1a2e', animSpeed = 5;
let animFrame = null;

const preview = document.getElementById('preview');
const animCanvas = document.getElementById('anim-canvas');
const animCtx = animCanvas.getContext('2d');

// ── Tabs ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    currentTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + currentTab).classList.add('active');
    stopAnim();
    updatePreview();
  };
});

// ── Solid ─────────────────────────────────────────────────────────────
const SOLID_COLORS = ['#1a1a2e','#16213e','#0f3460','#2c1654','#1b1b2f',
  '#0d0d0d','#1e3a2f','#2d1515','#2b2b2b','#ffffff',
  '#6c63ff','#ff6584','#ffd700','#44ff88','#00d4ff',
  '#ff8c00','#e94560','#533483','#052e16','#1e40af'];

const solidSwatchEl = document.getElementById('solid-swatch');
const solidPicker = document.getElementById('solid-picker');
solidSwatchEl.onclick = () => solidPicker.click();
solidPicker.oninput = e => { solidColor = e.target.value; document.getElementById('solid-hex').textContent = solidColor; updateSwatches(); updatePreview(); };

const solidSwatchesEl = document.getElementById('solid-swatches');
SOLID_COLORS.forEach(c => {
  const s = document.createElement('div'); s.className = 'swatch';
  s.style.background = c; s.title = c;
  s.onclick = () => { solidColor = c; solidPicker.value = c; document.getElementById('solid-hex').textContent = c; updateSwatches(); updatePreview(); };
  solidSwatchesEl.appendChild(s);
});

function updateSwatches() {
  solidSwatchEl.style.background = solidColor;
  solidSwatchesEl.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.title === solidColor));
}
updateSwatches();

// ── Gradient ──────────────────────────────────────────────────────────
const grad1El = document.getElementById('grad-swatch1'), grad2El = document.getElementById('grad-swatch2');
const gradP1 = document.getElementById('grad-picker1'), gradP2 = document.getElementById('grad-picker2');
grad1El.onclick = () => gradP1.click(); grad2El.onclick = () => gradP2.click();
gradP1.oninput = e => { gradColor1 = e.target.value; grad1El.style.background = gradColor1; updatePreview(); };
gradP2.oninput = e => { gradColor2 = e.target.value; grad2El.style.background = gradColor2; updatePreview(); };
grad1El.style.background = gradColor1; grad2El.style.background = gradColor2;

const DIRS = [
  {label:'↑', val:'to top'},{label:'↗', val:'to top right'},
  {label:'→', val:'to right'},{label:'↘', val:'to bottom right'},
  {label:'↓', val:'to bottom'},{label:'↙', val:'to bottom left'},
  {label:'←', val:'to left'},{label:'↖', val:'to top left'},
];
const RADIAL_DIR = {label:'⭕', val:'radial'};
const ALL_DIRS = [...DIRS, RADIAL_DIR, {label:'🔄', val:'conic'}];

const dirGrid = document.getElementById('dir-grid');
ALL_DIRS.forEach(d => {
  const b = document.createElement('button'); b.className = 'dir-btn'; b.textContent = d.label; b.title = d.val;
  b.onclick = () => { gradDir = d.val; dirGrid.querySelectorAll('.dir-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); updatePreview(); };
  if (d.val === gradDir) b.classList.add('active');
  dirGrid.appendChild(b);
});

const GRAD_PRESETS = [
  {name:'Midnight', c1:'#0f0c29', c2:'#302b63', dir:'to bottom right'},
  {name:'Sunset', c1:'#f7971e', c2:'#ffd200', dir:'to bottom'},
  {name:'Ocean', c1:'#2193b0', c2:'#6dd5ed', dir:'to bottom right'},
  {name:'Rose', c1:'#f953c6', c2:'#b91d73', dir:'to right'},
  {name:'Forest', c1:'#134e5e', c2:'#71b280', dir:'to top right'},
  {name:'Aurora', c1:'#00c6ff', c2:'#0072ff', dir:'to bottom left'},
  {name:'Lava', c1:'#200122', c2:'#6f0000', dir:'to bottom'},
  {name:'Cotton', c1:'#d9a7c7', c2:'#fffcdc', dir:'to bottom right'},
];

const gradPresetsEl = document.getElementById('grad-presets');
GRAD_PRESETS.forEach(p => {
  const b = document.createElement('button'); b.className = 'preset-btn';
  b.style.background = `linear-gradient(${p.dir}, ${p.c1}, ${p.c2})`;
  b.textContent = p.name;
  b.onclick = () => {
    gradColor1=p.c1; gradColor2=p.c2; gradDir=p.dir;
    gradP1.value=p.c1; gradP2.value=p.c2;
    grad1El.style.background=p.c1; grad2El.style.background=p.c2;
    dirGrid.querySelectorAll('.dir-btn').forEach(x => x.classList.toggle('active', x.title===p.dir));
    gradPresetsEl.querySelectorAll('.preset-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    updatePreview();
  };
  gradPresetsEl.appendChild(b);
});

function buildGradCSS() {
  if (gradDir === 'radial') return `radial-gradient(circle, ${gradColor1}, ${gradColor2})`;
  if (gradDir === 'conic') return `conic-gradient(${gradColor1}, ${gradColor2}, ${gradColor1})`;
  return `linear-gradient(${gradDir}, ${gradColor1}, ${gradColor2})`;
}

// ── Pattern ───────────────────────────────────────────────────────────
const pat1El = document.getElementById('pat-swatch1'), pat2El = document.getElementById('pat-swatch2');
const patP1 = document.getElementById('pat-picker1'), patP2 = document.getElementById('pat-picker2');
pat1El.onclick = () => patP1.click(); pat2El.onclick = () => patP2.click();
patP1.oninput = e => { patColor1=e.target.value; pat1El.style.background=patColor1; updatePreview(); };
patP2.oninput = e => { patColor2=e.target.value; pat2El.style.background=patColor2; updatePreview(); };
pat1El.style.background=patColor1; pat2El.style.background=patColor2;

const patScaleEl = document.getElementById('pat-scale');
const patOpacityEl = document.getElementById('pat-opacity');
patScaleEl.oninput = () => { patScale=+patScaleEl.value; document.getElementById('pat-scale-val').textContent=patScale+'px'; updatePreview(); };
patOpacityEl.oninput = () => { patOpacity=patOpacityEl.value/100; document.getElementById('pat-opacity-val').textContent=patOpacityEl.value+'%'; updatePreview(); };

const PATTERNS = [
  {name:'Dots', icon:'⚫', id:'dots'},
  {name:'Grid', icon:'#', id:'grid'},
  {name:'Stripes', icon:'☰', id:'stripes'},
  {name:'Diagonal', icon:'⟋', id:'diagonal'},
  {name:'Diamonds', icon:'◆', id:'diamonds'},
  {name:'Crosshatch', icon:'⊞', id:'crosshatch'},
  {name:'Zigzag', icon:'〰', id:'zigzag'},
  {name:'Circles', icon:'○', id:'circles'},
];

const patternGridEl = document.getElementById('pattern-grid');
PATTERNS.forEach(p => {
  const b = document.createElement('button'); b.className = 'preset-btn'; b.style.background='#252547';
  b.innerHTML = `<span style="font-size:1.1rem">${p.icon}</span> ${p.name}`;
  b.onclick = () => { patternType=p.id; patternGridEl.querySelectorAll('.preset-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); updatePreview(); };
  if (p.id===patternType) b.classList.add('active');
  patternGridEl.appendChild(b);
});

function buildPatternCSS() {
  const s = patScale, c = patColor2, bg = patColor1;
  const rgba = hexToRgba(c, patOpacity);
  switch(patternType) {
    case 'dots': return `${bg} radial-gradient(circle, ${rgba} ${s*0.15}px, transparent ${s*0.15}px) 0 0 / ${s}px ${s}px`;
    case 'grid': return `${bg} linear-gradient(${rgba} 1px, transparent 1px), linear-gradient(90deg, ${rgba} 1px, transparent 1px) 0 0 / ${s}px ${s}px`;
    case 'stripes': return `${bg} repeating-linear-gradient(0deg, transparent, transparent ${s*0.7}px, ${rgba} ${s*0.7}px, ${rgba} ${s}px)`;
    case 'diagonal': return `${bg} repeating-linear-gradient(45deg, ${rgba} 0, ${rgba} 2px, transparent 0, transparent 50%) 0 0 / ${s}px ${s}px`;
    case 'diamonds': return `${bg} linear-gradient(135deg,${rgba} 25%,transparent 25%),linear-gradient(225deg,${rgba} 25%,transparent 25%),linear-gradient(315deg,${rgba} 25%,transparent 25%),linear-gradient(45deg,${rgba} 25%,transparent 25%) 0 0/${s}px ${s}px`;
    case 'crosshatch': return `${bg} repeating-linear-gradient(45deg,${rgba} 0,${rgba} 1px,transparent 0,transparent 50%),repeating-linear-gradient(135deg,${rgba} 0,${rgba} 1px,transparent 0,transparent 50%) 0 0/${s}px ${s}px`;
    case 'zigzag': return `${bg} linear-gradient(135deg,${rgba} 25%,transparent 25%,transparent 75%,${rgba} 75%),linear-gradient(45deg,${rgba} 25%,transparent 25%,transparent 75%,${rgba} 75%) 0 0/${s}px ${s}px`;
    case 'circles': return `${bg} radial-gradient(circle at center, transparent ${s*0.35}px, ${rgba} ${s*0.35}px, ${rgba} ${s*0.45}px, transparent ${s*0.45}px) 0 0/${s}px ${s}px`;
    default: return bg;
  }
}

// ── Animated ──────────────────────────────────────────────────────────
const animSwatchEl = document.getElementById('anim-swatch');
const animPickerEl = document.getElementById('anim-picker');
animSwatchEl.onclick = () => animPickerEl.click();
animPickerEl.oninput = e => { animBaseColor=e.target.value; animSwatchEl.style.background=animBaseColor; updatePreview(); };
animSwatchEl.style.background=animBaseColor;
document.getElementById('anim-speed').oninput = e => { animSpeed=+e.target.value; document.getElementById('anim-speed-val').textContent=animSpeed; updatePreview(); };

const ANIMS = [
  {name:'Stars', icon:'⭐', id:'stars'},
  {name:'Bubbles', icon:'🫧', id:'bubbles'},
  {name:'Aurora', icon:'🌌', id:'aurora'},
  {name:'Rain', icon:'🌧️', id:'rain'},
  {name:'Fireflies', icon:'✨', id:'fireflies'},
  {name:'Waves', icon:'🌊', id:'waves'},
  {name:'Snowfall', icon:'❄️', id:'snow'},
  {name:'Confetti', icon:'🎊', id:'confetti'},
];

const animGridEl = document.getElementById('anim-grid');
ANIMS.forEach(a => {
  const b = document.createElement('button'); b.className = 'anim-btn';
  b.innerHTML = `<span class="anim-icon">${a.icon}</span>${a.name}`;
  b.onclick = () => { animType=a.id; animGridEl.querySelectorAll('.anim-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); updatePreview(); };
  if (a.id===animType) b.classList.add('active');
  animGridEl.appendChild(b);
});

// ── Animation engine ──────────────────────────────────────────────────
let particles = [];

function resizeCanvas() {
  const r = preview.getBoundingClientRect();
  animCanvas.width = r.width; animCanvas.height = r.height;
}

function stopAnim() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);
  animCanvas.style.display = 'none';
}

function startAnim() {
  resizeCanvas();
  animCanvas.style.display = 'block';
  particles = [];
  const W = animCanvas.width, H = animCanvas.height;
  const count = animType === 'confetti' ? 80 : animType === 'rain' ? 100 : 50;

  for (let i = 0; i < count; i++) {
    particles.push(makeParticle(W, H, true));
  }

  function loop() {
    animCtx.clearRect(0, 0, W, H);
    particles.forEach((p, i) => {
      drawParticle(p, W, H);
      updateParticle(p, W, H);
      if (isDead(p, W, H)) particles[i] = makeParticle(W, H, false);
    });
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

function hexToRgba(hex, a) {
  if (!hex || !hex.startsWith('#')) return `rgba(108,99,255,${a})`;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function randColor() {
  const cols = ['#ff6584','#6c63ff','#ffd700','#44ff88','#00d4ff','#ff8c00','#b57bee','#ff69b4','#a8ff3e'];
  return cols[Math.floor(Math.random()*cols.length)];
}

function makeParticle(W, H, scatter) {
  const sp = animSpeed * 0.4;
  switch(animType) {
    case 'stars': return {x:Math.random()*W, y:scatter?Math.random()*H:-5, vx:(Math.random()-.5)*0.3, vy:0.1+Math.random()*0.3*sp, r:Math.random()*2+0.5, alpha:Math.random(), color:'#ffffff'};
    case 'bubbles': return {x:Math.random()*W, y:scatter?Math.random()*H:H+10, vx:(Math.random()-.5)*0.5, vy:-(0.3+Math.random()*0.8*sp), r:Math.random()*12+4, alpha:0.3+Math.random()*0.4, color:randColor()};
    case 'rain': return {x:Math.random()*W, y:scatter?Math.random()*H:-10, vx:0.5, vy:3+Math.random()*5*sp*0.3, len:Math.random()*12+5, alpha:0.3+Math.random()*0.5, color:'#00d4ff'};
    case 'fireflies': return {x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*0.8*sp, vy:(Math.random()-.5)*0.8*sp, r:Math.random()*3+1, alpha:Math.random(), dA:(Math.random()-.5)*0.04, color:'#ffd700'};
    case 'snow': return {x:Math.random()*W, y:scatter?Math.random()*H:-5, vx:(Math.random()-.5)*0.5*sp, vy:0.3+Math.random()*1.2*sp*0.4, r:Math.random()*4+1, alpha:0.5+Math.random()*0.5, color:'#ffffff'};
    case 'confetti': return {x:Math.random()*W, y:scatter?Math.random()*H:-10, vx:(Math.random()-.5)*2*sp*0.3, vy:0.5+Math.random()*2*sp*0.3, rot:Math.random()*360, dRot:(Math.random()-.5)*5, w:Math.random()*8+4, h:Math.random()*4+2, color:randColor(), alpha:0.8+Math.random()*0.2};
    case 'aurora': return {x:Math.random()*W, y:Math.random()*H*0.6, vx:(Math.random()-.5)*0.3*sp, vy:(Math.random()-.5)*0.1*sp, r:Math.random()*60+30, alpha:0.02+Math.random()*0.06, color:randColor(), dA:0.001*sp};
    default: return {x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5), vy:(Math.random()-.5), r:2, alpha:0.5, color:'#fff'};
  }
}

function drawParticle(p, W, H) {
  animCtx.save(); animCtx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
  if (animType === 'rain') {
    animCtx.strokeStyle = p.color; animCtx.lineWidth = 1;
    animCtx.beginPath(); animCtx.moveTo(p.x, p.y); animCtx.lineTo(p.x+p.vx*2, p.y+p.len); animCtx.stroke();
  } else if (animType === 'confetti') {
    animCtx.translate(p.x, p.y); animCtx.rotate(p.rot*Math.PI/180);
    animCtx.fillStyle = p.color; animCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
  } else if (animType === 'aurora') {
    const g = animCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g.addColorStop(0, p.color); g.addColorStop(1, 'transparent');
    animCtx.fillStyle = g; animCtx.beginPath(); animCtx.arc(p.x,p.y,p.r,0,Math.PI*2); animCtx.fill();
  } else {
    animCtx.fillStyle = p.color; animCtx.beginPath(); animCtx.arc(p.x,p.y,p.r,0,Math.PI*2); animCtx.fill();
  }
  animCtx.restore();
}

function updateParticle(p, W, H) {
  p.x += p.vx; p.y += p.vy;
  if (p.dA !== undefined) p.alpha += p.dA;
  if (animType === 'fireflies') { if(p.alpha<=0||p.alpha>=1) p.dA*=-1; p.x+=Math.sin(Date.now()*0.001)*0.3; }
  if (animType === 'aurora') { if(p.alpha>=0.08||p.alpha<=0.01) p.dA*=-1; }
  if (animType === 'confetti') p.rot += p.dRot;
}

function isDead(p, W, H) {
  if (animType === 'bubbles') return p.y < -p.r*2;
  if (animType === 'aurora') return false;
  if (animType === 'fireflies') return false;
  return p.y > H+20 || p.x < -20 || p.x > W+20;
}

// ── Preview update ────────────────────────────────────────────────────
function updatePreview() {
  stopAnim();
  let bg = '';
  if (currentTab === 'solid') bg = solidColor;
  else if (currentTab === 'gradient') bg = buildGradCSS();
  else if (currentTab === 'pattern') bg = buildPatternCSS();
  else if (currentTab === 'animated') { bg = animBaseColor; startAnim(); }
  preview.style.background = bg;
}

function buildSavePayload() {
  if (currentTab === 'solid') return {type:'solid', css:solidColor};
  if (currentTab === 'gradient') return {type:'gradient', css:buildGradCSS()};
  if (currentTab === 'pattern') return {type:'pattern', css:buildPatternCSS()};
  if (currentTab === 'animated') return {type:'animated', animType, animBaseColor, animSpeed, css:animBaseColor};
  return {type:'solid', css:'#1a1a2e'};
}

// ── Actions ───────────────────────────────────────────────────────────
document.getElementById('btn-apply').onclick = () => {
  const payload = buildSavePayload();
  localStorage.setItem('bloopet_bg', JSON.stringify(payload));
  try { window.parent.postMessage({type:'bloopet_bg', payload}, '*'); } catch(e){}
  showStatus('✅ Background applied!');
};

document.getElementById('btn-reset').onclick = () => {
  localStorage.removeItem('bloopet_bg');
  try { window.parent.postMessage({type:'bloopet_bg_reset'}, '*'); } catch(e){}
  showStatus('↺ Background reset to default');
};

function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg; clearTimeout(s._t);
  s._t = setTimeout(() => s.textContent = '', 3000);
}

function hexToRgba(hex, a) {
  if (!hex || !hex.startsWith('#')) return `rgba(108,99,255,${a})`;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// Load saved background into preview
const savedBg = localStorage.getItem('bloopet_bg');
if (savedBg) {
  try {
    const d = JSON.parse(savedBg);
    preview.style.background = d.css;
  } catch(e){}
}

updatePreview();
</script>
