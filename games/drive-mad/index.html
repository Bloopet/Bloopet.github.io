<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Drive Mad</title>
    <script type="text/javascript" src="Jump_Gamemonetize.js"></script>
    <script src="/js/main.js"></script>
    <meta name="description" content="" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="webapp/fancade.css" />
    <link rel="icon" href="webapp/cover.jpg" />
  </head>
  <body id="body">
    <div id="modal_parent">
      <div id="modal_content">
        <span id="modal_close_button">&times;</span>
        <div id="store_link_modal_content" class="modal_inner"></div>
        <div id="share_file_modal_content" class="modal_inner"></div>
      </div>
    </div>
    <div id="canvas_border" class="emscripten_border">
      <div id="play_content" class="middle center">
        <div class="edge">
          <div class="box">
            <div class="black">
              <img src="webapp/cover.jpg" class="cover" />
              <p class="title">Drive Mad</p>
              <p class="author">Martin Magni</p>
            </div>
          </div>
        </div>
        <div id="progress_or_play"><progress id="progress" class="loading" value="0" max="100"></progress></div>
        <p class="description"></p>
      </div>
      <canvas class="emscripten" id="canvas" tabindex="-1"></canvas>
      <div id="gradient"></div>
      <div id="webview_content"></div>
    </div>
    <script type="text/javascript" src="webapp/source_min.js"></script>
    <script type="text/javascript" src="webapp/index.js"></script>
    <script type="text/javascript">
    (function() {
      var WIN_KEYWORDS = ['score', 'next', 'well done', 'level complete', 'you win', 'congrats'];
      var WIN_MSG_ID = 'bloopeet-win-msg';

      function tryInjectWinMsg(iframeEl) {
        try {
          var doc = iframeEl.contentDocument || (iframeEl.contentWindow && iframeEl.contentWindow.document);
          if (!doc || !doc.body) return;
          if (doc.getElementById(WIN_MSG_ID)) return;
          var bodyText = (doc.body.innerHTML || '').toLowerCase();
          var isWin = WIN_KEYWORDS.some(function(kw) { return bodyText.indexOf(kw) !== -1; });
          if (isWin) {
            var div = doc.createElement('div');
            div.id = WIN_MSG_ID;
            div.setAttribute('style', 'position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(0,0,0,0.55);color:#fff;font-size:22px;font-weight:bold;font-family:sans-serif;padding:8px 22px;border-radius:10px;pointer-events:none;white-space:nowrap;');
            div.textContent = 'I won on Bloopeet';
            doc.body.appendChild(div);
          }
        } catch (e) {}
      }

      function observeWebview() {
        var container = document.getElementById('webview_content');
        if (!container) return;
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
              if (node.tagName === 'IFRAME') {
                node.addEventListener('load', function() {
                  tryInjectWinMsg(node);
                });
                setTimeout(function() { tryInjectWinMsg(node); }, 300);
              }
            });
            if (container.style.display !== 'none') {
              var iframe = container.querySelector('iframe');
              if (iframe) {
                setTimeout(function() { tryInjectWinMsg(iframe); }, 300);
              }
            }
          });
        });
        observer.observe(container, { childList: true, attributes: true, attributeFilter: ['style'] });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', observeWebview);
      } else {
        observeWebview();
      }
    })();
    </script>
  </body>
</html>
