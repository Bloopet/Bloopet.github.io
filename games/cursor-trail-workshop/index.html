<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cursor Trail Workshop — Bloopet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:1.6rem;margin-bottom:2px;background:linear-gradient(90deg,#6c63ff,#ff6584,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:#888;font-size:0.8rem;margin-bottom:16px}
.main{display:flex;gap:14px;width:100%;max-width:820px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.preview-wrap{flex:1;min-width:280px;max-width:460px}
.preview-label{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.preview-area{width:100%;height:280px;border-radius:12px;border:2px solid #444;background:#0d0d1a;position:relative;overflow:hidden;cursor:none}
.preview-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .5s}
.preview-hint p{color:#555;font-size:0.85rem}
.preview-hint span{font-size:1.5rem}
canvas#trail-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.controls{flex:1;min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:12px}
.section-title{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.trail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.trail-btn{padding:8px 4px;border:2px solid #444;border-radius:8px;background:#252547;color:#fff;cursor:pointer;font-size:0.72rem;font-weight:600;text-align:center;transition:all .15s}
.trail-btn:hover{border-color:#6c63ff;background:#3a3a6e}
.trail-btn.active{border-color:#fff;background:#3a3a6e;box-shadow:0 0 10px rgba(108,99,255,.4)}
.trail-icon{font-size:1.3rem;display:block;margin-bottom:2px}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-pick{width:38px;height:38px;border-radius:8px;border:3px solid #fff;cursor:pointer;flex-shrink:0}
input[type=color]{opacity:0;position:absolute;width:0;height:0;pointer-events:none}
.rainbow-toggle{display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer;user-select:none}
.toggle-track{width:36px;height:20px;background:#444;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:#6c63ff}
.toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle-track.on .toggle-thumb{left:18px}
.rainbow-label{font-size:0.8rem;color:#aaa}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.slider-row label{font-size:0.72rem;color:#888;min-width:56px}
.slider-row input[type=range]{flex:1;accent-color:#6c63ff}
.slider-row span{font-size:0.72rem;color:#fff;min-width:28px;text-align:right}
.action-btns{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.btn{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.85rem;transition:all .15s;width:100%}
.btn-primary{background:linear-gradient(90deg,#6c63ff,#8b5cf6);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,99,255,.4)}
.btn-off{background:#252547;color:#aaa;border:2px solid #444}
.btn-off:hover{border-color:#ff6584;color:#ff6584}
.btn-danger{background:#1e1010;color:#ff6584;border:2px solid #3a1a1a}
.btn-danger:hover{background:#2a1515}
.status{font-size:0.75rem;color:#6c63ff;text-align:center;min-height:16px}
</style>
</head>
<body>
<h1>✨ Cursor Trail Workshop</h1>
<p class="subtitle">Move your mouse over the preview to test your trail</p>

<div class="main">
  <!-- Preview -->
  <div class="preview-wrap">
    <div class="preview-label">Live Preview — move mouse here</div>
    <div class="preview-area" id="preview-area">
      <canvas id="trail-canvas"></canvas>
      <div class="preview-hint" id="preview-hint">
        <span>🖱️</span>
        <p>Move mouse here to preview</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div>
      <div class="section-title">Trail Style</div>
      <div class="trail-grid" id="trail-grid"></div>
    </div>

    <div>
      <div class="section-title">Color</div>
      <div class="color-row">
        <div class="color-pick" id="color-swatch"></div>
        <input type="color" id="color-picker" value="#6c63ff">
        <span id="color-hex" style="font-size:0.75rem;color:#888">#6c63ff</span>
      </div>
      <div class="rainbow-toggle" id="rainbow-toggle">
        <div class="toggle-track" id="toggle-track"><div class="toggle-thumb"></div></div>
        <span class="rainbow-label">🌈 Rainbow mode</span>
      </div>
    </div>

    <div>
      <div class="section-title">Settings</div>
      <div class="slider-row">
        <label>Size</label>
        <input type="range" id="sl-size" min="2" max="20" value="8">
        <span id="sl-size-v">8</span>
      </div>
      <div class="slider-row">
        <label>Density</label>
        <input type="range" id="sl-density" min="1" max="10" value="5">
        <span id="sl-density-v">5</span>
      </div>
      <div class="slider-row">
        <label>Fade</label>
        <input type="range" id="sl-fade" min="1" max="10" value="5">
        <span id="sl-fade-v">5</span>
      </div>
    </div>

    <div class="action-btns">
      <button class="btn btn-primary" id="btn-apply">✅ Set as My Cursor Trail</button>
      <button class="btn btn-danger" id="btn-reset">↺ Remove Trail</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
let trailType = 'sparkles';
let trailColor = '#6c63ff';
let rainbow = false;
let size = 8, density = 5, fade = 5;

// ── Trail types ──────────────────────────────────────────────────────
const TRAILS = [
  {id:'sparkles', name:'Sparkles', icon:'✦'},
  {id:'bubbles',  name:'Bubbles',  icon:'🫧'},
  {id:'dots',     name:'Dots',     icon:'•••'},
  {id:'stars',    name:'Stars',    icon:'⭐'},
  {id:'hearts',   name:'Hearts',   icon:'❤️'},
  {id:'fire',     name:'Fire',     icon:'🔥'},
  {id:'snow',     name:'Snow',     icon:'❄️'},
  {id:'rainbow',  name:'Ribbon',   icon:'🌈'},
  {id:'comet',    name:'Comet',    icon:'☄️'},
  {id:'confetti', name:'Confetti', icon:'🎊'},
];

const trailGrid = document.getElementById('trail-grid');
TRAILS.forEach(t => {
  const b = document.createElement('button');
  b.className = 'trail-btn' + (t.id === trailType ? ' active' : '');
  b.innerHTML = `<span class="trail-icon">${t.icon}</span>${t.name}`;
  b.onclick = () => {
    trailType = t.id;
    trailGrid.querySelectorAll('.trail-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
  trailGrid.appendChild(b);
});

// ── Color ────────────────────────────────────────────────────────────
const colorSwatch = document.getElementById('color-swatch');
const colorPicker = document.getElementById('color-picker');
colorSwatch.onclick = () => colorPicker.click();
colorPicker.oninput = e => {
  trailColor = e.target.value;
  colorSwatch.style.background = trailColor;
  document.getElementById('color-hex').textContent = trailColor;
};
colorSwatch.style.background = trailColor;

// ── Rainbow toggle ───────────────────────────────────────────────────
document.getElementById('rainbow-toggle').onclick = () => {
  rainbow = !rainbow;
  const track = document.getElementById('toggle-track');
  track.classList.toggle('on', rainbow);
};

// ── Sliders ──────────────────────────────────────────────────────────
document.getElementById('sl-size').oninput = e => { size = +e.target.value; document.getElementById('sl-size-v').textContent = size; };
document.getElementById('sl-density').oninput = e => { density = +e.target.value; document.getElementById('sl-density-v').textContent = density; };
document.getElementById('sl-fade').oninput = e => { fade = +e.target.value; document.getElementById('sl-fade-v').textContent = fade; };

// ── Canvas preview ───────────────────────────────────────────────────
const previewArea = document.getElementById('preview-area');
const canvas = document.getElementById('trail-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let hintShown = true;

function resizeCanvas() {
  canvas.width = previewArea.clientWidth;
  canvas.height = previewArea.clientHeight;
}
resizeCanvas();

let hue = 0;
function getRainbowColor() {
  hue = (hue + 8) % 360;
  return `hsl(${hue},100%,65%)`;
}

function spawnParticles(x, y) {
  const count = Math.ceil(density / 2);
  const c = rainbow ? getRainbowColor() : trailColor;
  for (let i = 0; i < count; i++) {
    particles.push(makeParticle(trailType, x, y, size, c));
  }
}

function makeParticle(type, x, y, sz, color) {
  const base = {x, y, alpha:1, color, size:sz*(0.5+Math.random()*0.8)};
  switch(type) {
    case 'sparkles': return {...base, vx:(Math.random()-.5)*2, vy:(Math.random()-.5)*2-1, rot:Math.random()*360, dRot:(Math.random()-.5)*15, type:'sparkle'};
    case 'bubbles':  return {...base, vx:(Math.random()-.5)*0.8, vy:-0.5-Math.random()*1.5, r:sz*(0.4+Math.random()*0.6), type:'bubble'};
    case 'dots':     return {...base, vx:(Math.random()-.5)*1.5, vy:(Math.random()-.5)*1.5-0.5, r:sz*0.3, type:'dot'};
    case 'stars':    return {...base, vx:(Math.random()-.5)*1.5, vy:(Math.random()-.5)*1.5-0.5, rot:Math.random()*360, dRot:(Math.random()-.5)*10, r:sz*0.5, type:'star'};
    case 'hearts':   return {...base, vx:(Math.random()-.5)*1.2, vy:-0.8-Math.random()*1.2, type:'heart'};
    case 'fire':     return {...base, vx:(Math.random()-.5)*1.5, vy:-1-Math.random()*2, color:['#ff4500','#ff8c00','#ffd700','#ff6584'][Math.floor(Math.random()*4)], r:sz*0.4, type:'fire'};
    case 'snow':     return {...base, vx:(Math.random()-.5)*0.8, vy:0.5+Math.random()*1.5, r:sz*0.3, type:'snow'};
    case 'rainbow':  return {x,y, vx:(Math.random()-.5)*1, vy:(Math.random()-.5)*1-0.5, alpha:1, color:`hsl(${Math.random()*360},100%,65%)`, size:sz*0.35, type:'dot', r:sz*0.35};
    case 'comet':    return {...base, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, trail:[], type:'comet', r:sz*0.4};
    case 'confetti': return {...base, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3-0.5, rot:Math.random()*360, dRot:(Math.random()-.5)*12, w:sz*0.6, h:sz*0.3, color:`hsl(${Math.random()*360},100%,65%)`, type:'confetti'};
    default:         return {...base, vx:(Math.random()-.5)*2, vy:-1, r:sz*0.3, type:'dot'};
  }
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, p.alpha);
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.color;

  if (p.type === 'sparkle') {
    ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
    const s = p.size; ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.moveTo(0,-s); ctx.lineTo(s*0.15,-s*0.15); ctx.lineTo(s,0);
    ctx.lineTo(s*0.15,s*0.15); ctx.lineTo(0,s); ctx.lineTo(-s*0.15,s*0.15);
    ctx.lineTo(-s,0); ctx.lineTo(-s*0.15,-s*0.15);
    ctx.closePath(); ctx.fill();
  } else if (p.type === 'bubble') {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.strokeStyle = p.color; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.globalAlpha = p.alpha * 0.15; ctx.fill();
  } else if (p.type === 'dot') {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  } else if (p.type === 'star') {
    ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
    const r = p.r; ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const ia = a + 2 * Math.PI / 5;
      if (i===0) ctx.moveTo(r*Math.cos(a),r*Math.sin(a));
      else ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
      ctx.lineTo(r*0.4*Math.cos(ia),r*0.4*Math.sin(ia));
    }
    ctx.closePath(); ctx.fill();
  } else if (p.type === 'heart') {
    ctx.translate(p.x, p.y);
    const s = p.size * 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -s*0.5);
    ctx.bezierCurveTo(s, -s*1.5, s*2, s*0.5, 0, s*1.5);
    ctx.bezierCurveTo(-s*2, s*0.5, -s, -s*1.5, 0, -s*0.5);
    ctx.closePath(); ctx.fill();
  } else if (p.type === 'fire') {
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*2);
    g.addColorStop(0, p.color); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*2, 0, Math.PI*2); ctx.fill();
  } else if (p.type === 'snow') {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = p.alpha * 0.5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*1.8, 0, Math.PI*2);
    ctx.strokeStyle = p.color; ctx.lineWidth = 0.5; ctx.stroke();
  } else if (p.type === 'comet') {
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*3);
    g.addColorStop(0, p.color); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  } else if (p.type === 'confetti') {
    ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
  }
  ctx.restore();
}

function updateParticle(p) {
  p.x += p.vx; p.y += p.vy;
  p.alpha -= 0.015 * fade * 0.3;
  if (p.rot !== undefined) p.rot += p.dRot || 0;
  if (p.type === 'bubble' || p.type === 'snow') {
    p.vx += Math.sin(Date.now() * 0.003 + p.y) * 0.05;
  }
}

let lastX = -999, lastY = -999;
previewArea.addEventListener('mousemove', e => {
  const rect = previewArea.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  if (hintShown) { document.getElementById('preview-hint').style.opacity = '0'; hintShown = false; }
  const dist = Math.hypot(x - lastX, y - lastY);
  if (dist > (11 - density)) { spawnParticles(x, y); lastX = x; lastY = y; }
});

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => { drawParticle(p); updateParticle(p); });
  requestAnimationFrame(animLoop);
}
animLoop();

// ── Actions ──────────────────────────────────────────────────────────
document.getElementById('btn-apply').onclick = () => {
  const config = { trailType, trailColor, rainbow, size, density, fade };
  localStorage.setItem('bloopet_trail', JSON.stringify(config));
  try { window.parent.postMessage({ type: 'bloopet_trail', config }, '*'); } catch(e){}
  showStatus('✅ Trail applied across Bloopet!');
};

document.getElementById('btn-reset').onclick = () => {
  localStorage.removeItem('bloopet_trail');
  try { window.parent.postMessage({ type: 'bloopet_trail_reset' }, '*'); } catch(e){}
  showStatus('↺ Trail removed');
};

function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg; clearTimeout(s._t);
  s._t = setTimeout(() => s.textContent = '', 3000);
}

// Load saved config
const saved = localStorage.getItem('bloopet_trail');
if (saved) {
  try {
    const c = JSON.parse(saved);
    trailType = c.trailType || trailType;
    trailColor = c.trailColor || trailColor;
    rainbow = c.rainbow || false;
    size = c.size || size; density = c.density || density; fade = c.fade || fade;
    colorSwatch.style.background = trailColor;
    colorPicker.value = trailColor;
    document.getElementById('color-hex').textContent = trailColor;
    document.getElementById('toggle-track').classList.toggle('on', rainbow);
    document.getElementById('sl-size').value = size;
    document.getElementById('sl-density').value = density;
    document.getElementById('sl-fade').value = fade;
    document.getElementById('sl-size-v').textContent = size;
    document.getElementById('sl-density-v').textContent = density;
    document.getElementById('sl-fade-v').textContent = fade;
    trailGrid.querySelectorAll('.trail-btn').forEach((b, i) => b.classList.toggle('active', TRAILS[i].id === trailType));
  } catch(e){}
}
</script>
</body>
</html>
