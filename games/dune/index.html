<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dune</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    #gameContainer { width: 100%; height: 100%; }
    #loadingBar { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #fff; font-family: sans-serif; }
    #progressEmpty { height: 6px; background: #333; width: 220px; margin-top: 12px; border-radius: 3px; }
    #progressFull { height: 6px; background: #f5a623; width: 0%; border-radius: 3px; transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="loadingBar">
    <div style="font-size:1.4rem; margin-bottom:14px;">Loading Dune...</div>
    <div id="progressEmpty"><div id="progressFull"></div></div>
  </div>
  <div id="gameContainer"></div>
  <script src="Build/UnityLoader.js"></script>
  <script>
    var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Dunes.json", {
      onProgress: function(instance, progress) {
        var bar = document.getElementById("progressFull");
        if (bar) bar.style.width = (progress * 100) + "%";
        if (progress === 1) {
          var lb = document.getElementById("loadingBar");
          if (lb) lb.style.display = "none";
        }
      }
    });
  </script>
</body>
</html>
