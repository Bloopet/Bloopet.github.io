<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Classic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
    iframe { width: 100%; height: 100%; border: none; }
    #loading { color: #fff; font-size: 1.2rem; position: absolute; }
  </style>
</head>
<body>
  <div id="loading">Loading Minecraft Classic...</div>
  <iframe
    src="https://classic.minecraft.net/?join=true"
    allowfullscreen
    allow="fullscreen"
    onload="document.getElementById('loading').style.display='none'"
    title="Minecraft Classic">
  </iframe>
</body>
</html>
