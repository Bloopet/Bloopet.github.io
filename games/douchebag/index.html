<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Douchebag Games</title>
<style>
  body { background: #0a0a14; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  h1 { color: #00d4ff; text-align: center; margin-bottom: 30px; }
  .cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
  .card { display: flex; flex-direction: column; align-items: center; background: #1a1a2e; border: 2px solid #333; border-radius: 12px; padding: 16px; text-decoration: none; color: #fff; width: 160px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
  .card:hover { border-color: #00d4ff; transform: scale(1.05); }
  .card img { width: 120px; height: 80px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
  .card span { font-size: 13px; text-align: center; }
</style>
</head>
<body>
<h1>Douchebag Games</h1>
<div class="cards">
    <a href="douchebaglife/index.html" class="card">
      <img src="/img/games/douchebaglife.png" onerror="this.style.display='none'">
      <span>Douchebag Life</span>
    </a>
    <a href="douchebagworkout2/index.html" class="card">
      <img src="/img/games/douchebagworkout2.png" onerror="this.style.display='none'">
      <span>Douchebag Workout 2</span>
    </a></div>
</body>
</html>
