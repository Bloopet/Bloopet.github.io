<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>No Internet — Bloopet</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a6cf5'/><text y='72' x='50' text-anchor='middle' font-size='60'>🎮</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #1a6cf5;
    --dark:   #0d1117;
    --card:   #161b22;
    --border: #30363d;
    --text:   #e6edf3;
    --muted:  #8b949e;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* animated floating orbs in background */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 8s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .orb1 { width: 320px; height: 320px; background: #1a6cf5; top: -80px; left: -60px; animation-delay: 0s; }
  .orb2 { width: 260px; height: 260px; background: #8b5cf6; bottom: -60px; right: -40px; animation-delay: -4s; }
  .orb3 { width: 180px; height: 180px; background: #06b6d4; bottom: 30%; left: 10%; animation-delay: -2s; }
  @keyframes drift {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(30px) scale(1.08); }
  }

  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  .icon-wrap {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg,#1a3a6f,#0d1f3c);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 44px;
    animation: wobble 3s ease-in-out infinite;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }

  h1 {
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #e6edf3 30%, #8b949e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 36px;
  }

  .tips {
    background: rgba(26,108,245,.08);
    border: 1px solid rgba(26,108,245,.2);
    border-radius: 14px;
    padding: 18px 20px;
    text-align: left;
    margin-bottom: 32px;
  }
  .tips-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--blue);
    margin-bottom: 10px;
  }
  .tips ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tips li {
    color: var(--muted);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tips li::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blue);
    flex-shrink: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .15s;
    text-decoration: none;
  }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); opacity: 1; }

  .logo {
    position: absolute;
    top: 20px;
    left: 24px;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--blue);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status {
    margin-top: 20px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .status span {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f85149;
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse-red 1.5s ease-in-out infinite;
  }
  @keyframes pulse-red {
    0%,100% { opacity: 1; }
    50%      { opacity: .3; }
  }

  @media (max-width: 480px) {
    .card { padding: 40px 24px 32px; border-radius: 18px; }
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="logo">🎮 Bloopet</div>

  <div class="icon-wrap">📡</div>

  <h1>No Internet Connection</h1>
  <p class="sub">Looks like you've gone offline. Don't worry — check your connection and try again!</p>

  <div class="tips">
    <div class="tips-title">Things to try</div>
    <ul>
      <li>Check your Wi-Fi or cable connection</li>
      <li>Try turning your router off and on again</li>
    </ul>
  </div>

  <button class="btn" onclick="tryAgain()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.2"/></svg>
    Try Again
  </button>

  <div class="status"><span></span>Offline</div>
</div>

<script>
  function tryAgain() {
    location.reload();
  }
  /* Auto-reload once internet is back */
  window.addEventListener('online', function() {
    location.reload();
  });
</script>
</body>
</html>
